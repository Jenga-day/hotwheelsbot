name: Hot Wheels Tracker
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Tools
        run: |
          pip install playwright requests
          playwright install chromium
      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MY_PINCODE: ${{ secrets.MY_PINCODE }}
        run: python hotwheels_bot.py
